<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta
      name="description"
      content="LinguaFlow Pro - AI Translator with 37+ Languages Support"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>LinguaFlow Pro • 37+ Languages • AI Translator</title>

    <!-- Favicon with gradient -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234f46e5'/%3E%3Cstop offset='100%25' stop-color='%23933ea1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23grad)' d='M363 176L246 464h47.4l24.2-71h108.7l24.2 71H496L379 176h-16zm-53.3 167L352 241l42.3 102h-84.6zm-211.8 82L0 304l30.4-30.4 67.8 67.8L169 270.6l30.4 30.4L97.9 425zM256 0L137.1 119l30.4 30.4L256 60.9 344.5 149.4l30.4-30.4L256 0z'/%3E%3C/svg%3E"
    />

    <!-- External Libraries -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Preload critical assets -->
    <link rel="preload" href="styles.css" as="style" />
  </head>
  <body>
    <!-- Animated Gradient Background -->
    <canvas id="gradient-canvas" aria-hidden="true"></canvas>
    <div class="bg-glow-overlay" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Main Application Container -->
    <div class="app-container" role="main">
      <!-- Header -->
      <div class="app-header">
        <div class="header-title">
          <i class="fa-solid fa-language" aria-hidden="true"></i>
          <span>LinguaFlow Pro • AI Translator</span>
        </div>
        <div class="header-controls">
          <span class="header-badge">
            <i class="fa-solid fa-globe" aria-hidden="true"></i>
            <span>37+ Languages</span>
          </span>
          <button
            class="header-btn"
            id="theme-toggle-btn"
            title="Toggle dark mode"
            aria-label="Toggle theme"
          >
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
            <span>Dark</span>
          </button>
          <button
            class="header-btn"
            id="clear-history-btn"
            title="Clear chat history"
            aria-label="Clear chat"
          >
            <i class="fa-solid fa-trash" aria-hidden="true"></i>
            <span>Clear</span>
          </button>
        </div>
      </div>

      <!-- Language Detection Stats Bar -->
      <div class="stats-bar">
        <div class="stats-label">
          <i class="fa-solid fa-magic" aria-hidden="true"></i>
          <span>Auto-detects:</span>
        </div>
        <div class="stats-badges">
          <span class="lang-badge">🇺🇸 English</span>
          <span class="lang-badge">🇪🇸 Spanish</span>
          <span class="lang-badge">🇫🇷 French</span>
          <span class="lang-badge">🇩🇪 German</span>
          <span class="lang-badge">🇮🇹 Italian</span>
          <span class="lang-badge">🇨🇳 Chinese</span>
          <span class="lang-badge">🇯🇵 Japanese</span>
          <span class="lang-badge">+30 more</span>
        </div>
      </div>

      <!-- Chat Area -->
      <div
        id="chat-area"
        role="log"
        aria-live="polite"
        aria-label="Chat messages"
      ></div>

      <!-- Error Message Display -->
      <div id="error-message" role="alert" aria-live="assertive">
        <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
        <span id="error-text"></span>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-row">
          <div class="input-wrapper">
            <textarea
              id="input-text"
              class="input-text"
              rows="1"
              placeholder="Type or paste text in ANY language.."
              aria-label="Text input for language processing"
              autocomplete="off"
            ></textarea>
            <div class="input-controls">
              <button
                id="voice-btn"
                class="input-control-btn"
                title="Voice input"
                aria-label="Speak input text"
                style="display: none"
              >
                <i class="fa-solid fa-microphone" aria-hidden="true"></i>
              </button>
              <button
                id="clear-btn"
                class="input-control-btn"
                title="Clear input"
                aria-label="Clear text input"
              >
                <i class="fa-solid fa-times-circle" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <button
            id="send-btn"
            class="send-btn"
            title="Send message (or press Enter)"
            aria-label="Send text for processing"
          >
            <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
            <span>Send</span>
          </button>
        </div>

        <!-- Feature Tags -->
        <div class="feature-tags">
          <span class="feature-tag">
            <i class="fa-solid fa-check-circle" aria-hidden="true"></i>
            Advanced Language Detection
          </span>
          <span class="feature-tag">
            <i class="fa-solid fa-arrows-spin" aria-hidden="true"></i>
            37+ Language Translation
          </span>
          <span class="feature-tag">
            <i class="fa-solid fa-chart-simple" aria-hidden="true"></i>
            Smart Summarization
          </span>
        </div>
      </div>
    </div>

    <!-- Gradient Animation Script (Canvas Background) -->
    <script>
      (function () {
        const canvas = document.getElementById("gradient-canvas");
        const ctx = canvas.getContext("2d");
        let width = window.innerWidth;
        let height = window.innerHeight;
        let mouseX = width / 2;
        let mouseY = height / 2;
        let targetX = mouseX;
        let targetY = mouseY;
        let time = 0;

        const colorStops = [
          { r: 79, g: 70, b: 229 },
          { r: 139, g: 92, b: 246 },
          { r: 168, g: 85, b: 247 },
          { r: 236, g: 72, b: 153 },
          { r: 59, g: 130, b: 246 },
          { r: 20, g: 184, b: 166 },
        ];

        function updateSize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        }

        window.addEventListener("resize", updateSize);
        document.addEventListener("mousemove", (e) => {
          targetX = e.clientX;
          targetY = e.clientY;
        });

        function animateGradient() {
          mouseX += (targetX - mouseX) * 0.05;
          mouseY += (targetY - mouseY) * 0.05;
          time += 0.008;

          const colorIndex1 =
            (Math.sin(time * 0.6) * 0.5 + 0.5) * (colorStops.length - 1);
          const colorIndex2 =
            (Math.sin(time * 0.9 + 2) * 0.5 + 0.5) * (colorStops.length - 1);
          const idx1 = Math.floor(colorIndex1) % colorStops.length;
          const idx2 = Math.floor(colorIndex2) % colorStops.length;
          const mix1 = colorIndex1 - idx1;
          const mix2 = colorIndex2 - idx2;

          const c1 = colorStops[idx1];
          const c2 = colorStops[(idx1 + 1) % colorStops.length];
          const baseR = c1.r + (c2.r - c1.r) * mix1;
          const baseG = c1.g + (c2.g - c1.g) * mix1;
          const baseB = c1.b + (c2.b - c1.b) * mix1;

          const c3 = colorStops[idx2];
          const c4 = colorStops[(idx2 + 1) % colorStops.length];
          const accentR = c3.r + (c4.r - c3.r) * mix2;
          const accentG = c3.g + (c4.g - c3.g) * mix2;
          const accentB = c3.b + (c4.b - c3.b) * mix2;

          const grad = ctx.createRadialGradient(
            mouseX + Math.sin(time * 1.3) * 35,
            mouseY + Math.cos(time * 1.7) * 25,
            50,
            mouseX + Math.cos(time * 0.9) * 70,
            mouseY + Math.sin(time * 1.1) * 60,
            width * 0.8,
          );

          grad.addColorStop(0, `rgba(${baseR}, ${baseG}, ${baseB}, 0.95)`);
          grad.addColorStop(
            0.35,
            `rgba(${accentR}, ${accentG}, ${accentB}, 0.85)`,
          );
          grad.addColorStop(0.7, `rgba(45, 23, 89, 0.8)`);
          grad.addColorStop(1, `rgba(15, 8, 48, 0.9)`);

          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, width, height);

          const grad2 = ctx.createLinearGradient(
            width * (0.3 + Math.sin(time * 0.4) * 0.1),
            height * (0.2 + Math.cos(time * 0.7) * 0.1),
            width * (0.7 + Math.sin(time * 0.5) * 0.15),
            height * (0.8 + Math.cos(time * 0.6) * 0.12),
          );
          grad2.addColorStop(0, `rgba(139, 92, 246, 0.3)`);
          grad2.addColorStop(1, `rgba(236, 72, 153, 0.25)`);
          ctx.globalCompositeOperation = "lighter";
          ctx.fillStyle = grad2;
          ctx.fillRect(0, 0, width, height);
          ctx.globalCompositeOperation = "source-over";

          requestAnimationFrame(animateGradient);
        }

        updateSize();
        animateGradient();
      })();
    </script>

    <!-- Main Application Script -->
    <script src="script.js"></script>
  </body>
</html>
