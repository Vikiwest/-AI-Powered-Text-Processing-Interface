<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaFlow Pro · 30+ Languages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for better icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #chat-area { scroll-behavior: smooth; }
        #chat-area::-webkit-scrollbar { width: 6px; }
        #chat-area::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        #chat-area::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
        #chat-area::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* Language badge animation */
        .lang-badge {
            transition: all 0.3s ease;
        }
        .lang-badge:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* Flag icons sizing */
        .flag-icon {
            width: 1.2em;
            height: 1.2em;
            border-radius: 2px;
            margin-right: 4px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 h-screen flex flex-col justify-center items-center p-4">
    <!-- Main Card Container -->
    <div class="max-w-4xl w-full h-[90vh] flex flex-col bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-white/20 overflow-hidden">
        
        <!-- Header with Language Count Badge -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-5 text-white font-semibold text-xl tracking-wide shadow-md flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-language text-2xl"></i>
                <span>🌍 LinguaFlow Pro · AI Translator</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs bg-white/30 px-4 py-1.5 rounded-full flex items-center gap-1">
                    <i class="fa-solid fa-globe"></i> 30+ Languages
                </span>
                <span class="text-xs bg-white/30 px-3 py-1.5 rounded-full">v3.0</span>
            </div>
        </div>

        <!-- Language Stats Bar -->
        <div class="bg-indigo-50 px-6 py-2 border-b border-indigo-100 flex flex-wrap items-center gap-3 text-sm">
            <i class="fa-solid fa-magic text-indigo-500"></i>
            <span class="text-indigo-700 font-medium">Auto-detects:</span>
            <div class="flex flex-wrap gap-1">
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇺🇸 English</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇪🇸 Spanish</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇫🇷 French</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇩🇪 German</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇮🇹 Italian</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇵🇹 Portuguese</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇷🇺 Russian</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇯🇵 Japanese</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">🇨🇳 Chinese</span>
                <span class="lang-badge bg-white px-2 py-0.5 rounded-full text-xs shadow-sm">+21 more</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-area" class="flex-1 p-5 overflow-y-auto space-y-4 bg-gray-50/80"></div>

        <!-- Error Message Area -->
        <div id="error-message" class="text-sm text-rose-600 px-5 pt-2 font-medium hidden flex items-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text"></span>
        </div>

        <!-- Input Area -->
        <div class="p-5 bg-white border-t border-gray-200 space-y-3">
            <div class="flex items-end gap-2">
                <div class="flex-1 relative">
                    <textarea id="input-text"
                              class="w-full p-4 pr-12 rounded-xl border border-gray-300 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 transition-all resize-none max-h-32"
                              rows="1"
                              placeholder="Type in any language... (Enter to send, Shift+Enter for new line)"></textarea>
                    <button id="clear-btn" class="absolute right-3 bottom-4 text-gray-400 hover:text-gray-600 transition" title="Clear input">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>
                <button id="send-btn" class="h-fit bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-xl font-medium shadow-md hover:shadow-lg transition-all duration-200 flex items-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span>Send</span>
                </button>
            </div>
            
            <!-- Feature Tags -->
            <div class="flex flex-wrap gap-2 text-xs">
                <span class="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full flex items-center gap-1">
                    <i class="fa-solid fa-check-circle text-indigo-500"></i> 30+ Language Detection
                </span>
                <span class="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full flex items-center gap-1">
                    <i class="fa-solid fa-arrows-spin"></i> Bi-directional Translation
                </span>
                <span class="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full flex items-center gap-1">
                    <i class="fa-solid fa-chart-simple"></i> Smart Summarization
                </span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
