        // Unicode ranges for script detection
        function detectScript(text) {
          const codePoints = Array.from(text).map((c) => c.codePointAt(0) || 0);

          // Check for CJK (Chinese/Japanese/Korean)
          const hasCJK = codePoints.some(
            (cp) =>
              (cp >= 0x4e00 && cp <= 0x9fff) || // CJK Unified Ideographs
              (cp >= 0x3400 && cp <= 0x4dbf) || // CJK Extension A
              (cp >= 0x20000 && cp <= 0x2a6df),
          ); // CJK Extension B
          if (hasCJK) return "cjk";

          // Check Hiragana/Katakana (Japanese specific)
          const hasJapanese = codePoints.some(
            (cp) =>
              (cp >= 0x3040 && cp <= 0x309f) || // Hiragana
              (cp >= 0x30a0 && cp <= 0x30ff),
          ); // Katakana
          if (hasJapanese) return "japanese";

          // Check Hangul (Korean)
          const hasHangul = codePoints.some(
            (cp) =>
              (cp >= 0xac00 && cp <= 0xd7af) || // Hangul syllables
              (cp >= 0x1100 && cp <= 0x11ff),
          ); // Hangul Jamo
          if (hasHangul) return "hangul";

          // Cyrillic
          const hasCyrillic = codePoints.some(
            (cp) =>
              (cp >= 0x0400 && cp <= 0x04ff) || (cp >= 0x0500 && cp <= 0x052f),
          );
          if (hasCyrillic) return "cyrillic";

          // Greek
          const hasGreek = codePoints.some(
            (cp) => cp >= 0x0370 && cp <= 0x03ff,
          );
          if (hasGreek) return "greek";

          // Arabic
          const hasArabic = codePoints.some(
            (cp) =>
              (cp >= 0x0600 && cp <= 0x06ff) || (cp >= 0x0750 && cp <= 0x077f),
          );
          if (hasArabic) return "arabic";

          // Hebrew
          const hasHebrew = codePoints.some(
            (cp) => cp >= 0x0590 && cp <= 0x05ff,
          );
          if (hasHebrew) return "hebrew";

          // Thai
          const hasThai = codePoints.some((cp) => cp >= 0x0e00 && cp <= 0x0e7f);
          if (hasThai) return "thai";

          // Devanagari (Hindi, etc)
          const hasDevanagari = codePoints.some(
            (cp) => cp >= 0x0900 && cp <= 0x097f,
          );
          if (hasDevanagari) return "devanagari";

          return "latin";
        }

        // Enhanced language detection with script analysis
        async function detectLanguageWithConfidence(text) {
          const script = detectScript(text);
          const textSample = text.slice(0, 300);

          // First try script-based detection for non-Latin scripts
          if (script === "cjk") {
            // Distinguish Chinese from Japanese
            const hasHiraganaKatakana = /[\u3040-\u309F\u30A0-\u30FF]/.test(
              text,
            );
            if (hasHiraganaKatakana) {
              return { code: "ja", confidence: 92, method: "script" };
            }
            // Check for Korean mixed in CJK
            const hasHangul = /[\uAC00-\uD7AF]/.test(text);
            if (hasHangul) {
              return { code: "ko", confidence: 90, method: "script" };
            }
            return { code: "zh", confidence: 95, method: "script" };
          }

          if (script === "japanese") {
            return { code: "ja", confidence: 96, method: "script" };
          }

          if (script === "hangul") {
            return { code: "ko", confidence: 96, method: "script" };
          }

          if (script === "cyrillic") {
            // Russian, Ukrainian, Bulgarian, Serbian - use API for accuracy
            return await apiLanguageDetection(textSample);
          }

          if (script === "greek") {
            return { code: "el", confidence: 94, method: "script" };
          }

          if (script === "arabic") {
            // Arabic, Persian, Urdu - API will distinguish
            return await apiLanguageDetection(textSample);
          }

          if (script === "hebrew") {
            return { code: "he", confidence: 95, method: "script" };
          }

          if (script === "thai") {
            return { code: "th", confidence: 97, method: "script" };
          }

          if (script === "devanagari") {
            return { code: "hi", confidence: 93, method: "script" };
          }

          // For Latin script, use Google Translate API with improved parsing
          return await apiLanguageDetection(textSample);
        }

        // API-based detection with proper response parsing
        async function apiLanguageDetection(text) {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&dt=ld&q=${encodeURIComponent(text)}`;

          try {
            const response = await fetch(url);
            if (!response.ok) throw new Error();
            const data = await response.json();

            // Parse language from response - data[2] contains the detected language code
            let langCode = data[2] || "en";

            // Map Google's language codes to our standard
            const codeMap = {
              "zh-CN": "zh",
              "zh-TW": "zh",
              "zh-HK": "zh",
              "pt-PT": "pt",
              "pt-BR": "pt",
              in: "id", // Indonesian
              iw: "he", // Hebrew
              jw: "jv", // Javanese (not in our list)
              "ko-KP": "ko",
              "ko-KR": "ko",
            };

            langCode = codeMap[langCode] || langCode;

            // Extract confidence if available
            let confidence = null;
            if (data[8] && data[8][0] && data[8][0][0] !== undefined) {
              let rawConf = parseFloat(data[8][0][0]);
              if (!isNaN(rawConf) && rawConf > 0) {
                confidence = Math.min(99, Math.round(rawConf * 100));
              }
            }

            // If confidence is low but we have a valid language, still use it
            if (!confidence && langCode && LANGUAGES[langCode]) {
              confidence = 85; // Default confidence for API detection
            }

            return {
              code: langCode,
              confidence: confidence || 75,
              method: "api",
            };
          } catch (error) {
            console.warn("API detection failed:", error);
            return { code: "en", confidence: 50, method: "fallback" };
          }
        }

        async function getEnhancedTranslation(
          text,
          targetCode,
          sourceCode = "auto",
        ) {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceCode}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
          try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error();
            const data = await resp.json();
            const translation = data[0].map((item) => item[0]).join(" ");
            const detectedSource = data[2] || sourceCode;
            return {
              text: translation,
              sourceLang: detectedSource,
              targetLang: targetCode,
            };
          } catch (err) {
            return {
              text: "❌ Translation temporarily unavailable",
              sourceLang: "unknown",
              targetLang: targetCode,
            };
          }
        }

        inputText.addEventListener("input", function () {
          this.style.height = "auto";
          this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        async function processText() {
          const text = inputText.value.trim();
          if (!text) {
            showError("Please enter some text to translate or analyze");
            return;
          }
          if (isProcessing) {
            showError("Still processing previous request...");
            return;
          }

          hideError();
          isProcessing = true;
          sendBtn.disabled = true;
          sendBtn.classList.add("opacity-50", "cursor-not-allowed");

          appendMessage("You", text, "bg-indigo-100 text-gray-800", "user");
          inputText.value = "";
          inputText.style.height = "auto";

          const typingId = showTypingIndicator();

          try {
            const detection = await detectLanguageWithConfidence(text);
            removeTypingIndicator(typingId);

            const detectedLang = LANGUAGES[detection.code] || {
              name: detection.code.toUpperCase(),
              flag: "🌐",
              native: detection.code,
            };
            const methodEmoji =
              detection.method === "script"
                ? "🎯"
                : detection.method === "api"
                  ? "🌐"
                  : "⚡";
            const confidenceText = detection.confidence
              ? ` · ${detection.confidence}% confidence`
              : "";

            appendMessage(
              "AI",
              `${methodEmoji} **Language Detection**\n${detectedLang.flag} **${detectedLang.name}** (${detectedLang.native})\n\`${detection.code}\`${confidenceText}\n${detection.method === "script" ? "✓ Script-based detection" : "✓ AI-powered detection"}`,
              "bg-gray-100 text-gray-800",
              "ai",
            );

            const actions = await createResponsiveActionPanel(
              text,
              detection.code,
            );
            if (actions) {
              chatArea.appendChild(actions);
              chatArea.scrollTop = chatArea.scrollHeight;
            }
          } catch (err) {
            console.error(err);
            removeTypingIndicator(typingId);
            appendMessage(
              "AI",
              "⚠️ Network error. Please try again later.",
              "bg-red-50 text-red-700",
              "ai",
            );
          } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            sendBtn.classList.remove("opacity-50", "cursor-not-allowed");
          }
          cleanupOldMessages();
          chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function createResponsiveActionPanel(originalText, detectedCode) {
          const container = document.createElement("div");
          container.className = "flex flex-col gap-3 ml-2 sm:ml-6 mt-2 mb-1";

          const transCard = document.createElement("div");
          transCard.className =
            "bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden w-full";
          transCard.innerHTML = `
            <div class="bg-gradient-to-r from-indigo-50 to-purple-50 px-3 sm:px-4 py-2 border-b border-gray-200 flex items-center gap-2">
                <i class="fa-solid fa-language text-indigo-500 text-sm"></i>
                <span class="font-semibold text-xs sm:text-sm">Translate to any language</span>
            </div>
            <div class="p-3 sm:p-4 space-y-3">
                <div class="flex flex-wrap gap-1.5 sm:gap-2 quick-lang-row" id="quick-lang-row-${Date.now()}"></div>
                <div class="flex flex-col sm:flex-row gap-2">
                    <select id="full-lang-select" class="flex-1 p-2.5 text-sm rounded-lg border border-gray-300 focus:border-indigo-400 bg-white text-gray-700"></select>
                    <button id="full-translate-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2 shadow-sm">Translate</button>
                </div>
            </div>
        `;

          const quickContainer = transCard.querySelector(".quick-lang-row");
          const popular = [
            "es",
            "fr",
            "de",
            "it",
            "pt",
            "ja",
            "ko",
            "zh",
            "ru",
            "ar",
          ];
          if (quickContainer) {
            popular.forEach((code) => {
              if (LANGUAGES[code] && code !== detectedCode) {
                const btn = document.createElement("button");
                btn.className =
                  "quick-lang-btn px-2 sm:px-3 py-1.5 text-[11px] sm:text-xs bg-gray-100 hover:bg-indigo-100 rounded-full transition flex items-center gap-1";
                btn.innerHTML = `${LANGUAGES[code].flag} ${LANGUAGES[code].name}`;
                btn.addEventListener("click", async (e) => {
                  e.preventDefault();
                  btn.disabled = true;
                  btn.innerHTML = `${LANGUAGES[code].flag} ...`;
                  const translation = await getEnhancedTranslation(
                    originalText,
                    code,
                    detectedCode,
                  );
                  appendMessage(
                    "AI",
                    `${LANGUAGES[code].flag} **${LANGUAGES[code].name}:**\n\n${translation.text}`,
                    "bg-indigo-50 text-gray-800",
                    "ai",
                  );
                  btn.disabled = false;
                  btn.innerHTML = `${LANGUAGES[code].flag} ${LANGUAGES[code].name}`;
                });
                quickContainer.appendChild(btn);
              }
            });
          }

          const selectLang = transCard.querySelector("#full-lang-select");
          SORTED_LANGUAGES.forEach(({ code, flag, name }) => {
            if (code !== detectedCode) {
              const opt = document.createElement("option");
              opt.value = code;
              opt.textContent = `${flag} ${name}`;
              selectLang.appendChild(opt);
            }
          });

          const fullBtn = transCard.querySelector("#full-translate-btn");
          fullBtn.addEventListener("click", async () => {
            const target = selectLang.value;
            fullBtn.disabled = true;
            fullBtn.innerHTML =
              '<i class="fa-solid fa-spinner fa-pulse"></i> Translating';
            const translation = await getEnhancedTranslation(
              originalText,
              target,
              detectedCode,
            );
            const targetLang = LANGUAGES[target] || {
              flag: "🌐",
              name: target,
            };
            appendMessage(
              "AI",
              `${targetLang.flag} **${targetLang.name} Translation:**\n\n${translation.text}`,
              "bg-indigo-50 text-gray-800",
              "ai",
            );
            fullBtn.disabled = false;
            fullBtn.innerHTML = "Translate";
          });

          container.appendChild(transCard);

          if (detectedCode === "en" && originalText.length > 150) {
            const sumCard = document.createElement("div");
            sumCard.className =
              "bg-white rounded-xl border border-purple-200 shadow-sm overflow-hidden";
            sumCard.innerHTML = `
                <div class="bg-purple-50 px-3 sm:px-4 py-2 border-b border-purple-200 flex items-center gap-2">
                    <i class="fa-solid fa-compress text-purple-500"></i>
                    <span class="font-semibold text-xs sm:text-sm">Smart Summary</span>
                </div>
                <div class="p-3 sm:p-4">
                    <button id="summary-action-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium flex items-center justify-center gap-2 transition shadow-sm">✨ Generate Summary</button>
                </div>
            `;
            const sumBtn = sumCard.querySelector("#summary-action-btn");
            sumBtn.addEventListener("click", () => {
              const summary = summarizeText(originalText, 2);
              appendMessage(
                "AI",
                `📝 **Concise Summary**\n\n${summary}`,
                "bg-purple-50 text-gray-800",
                "ai",
              );
            });
            container.appendChild(sumCard);
          }

          return container;
        }

        function summarizeText(text, numSentences = 2) {
          if (!text) return "No content to summarize.";
          const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
          if (sentences.length <= numSentences) return text;
          const words = text.toLowerCase().match(/\b\w+\b/g) || [];
          const freq = {};
          words.forEach((w) => (freq[w] = (freq[w] || 0) + 1));
          const scored = sentences.map((sent, idx) => {
            const sentWords = sent.toLowerCase().match(/\b\w+\b/g) || [];
            let score = sentWords.reduce((s, w) => s + (freq[w] || 0), 0);
            if (idx === 0) score += 5;
            return { sentence: sent.trim(), score };
          });
          const top = scored
            .sort((a, b) => b.score - a.score)
            .slice(0, numSentences);
          top.sort(
            (a, b) =>
              sentences.indexOf(a.sentence) - sentences.indexOf(b.sentence),
          );
          return top.map((s) => s.sentence).join(" ");
        }

        function showError(msg) {
          errorText.textContent = msg;
          errorDiv.classList.remove("hidden");
          setTimeout(() => errorDiv.classList.add("hidden"), 4000);
        }
        function hideError() {
          errorDiv.classList.add("hidden");
          errorText.textContent = "";
        }

        function appendMessage(sender, text, bgColor, senderType) {
          const div = document.createElement("div");
          div.className = `flex ${senderType === "user" ? "justify-end" : "justify-start"} mb-2 sm:mb-3`;
          const bubble = document.createElement("div");
          let formatted = text
            .replace(
              /\`(.*?)\`/g,
              '<code class="bg-gray-200/80 px-1.5 py-0.5 rounded text-xs font-mono">$1</code>',
            )
            .replace(
              /\*\*(.*?)\*\*/g,
              '<strong class="font-semibold">$1</strong>',
            )
            .replace(/\n/g, "<br>");
          bubble.innerHTML = formatted;
          bubble.className = `message-bubble p-3 sm:p-4 rounded-2xl max-w-[85%] sm:max-w-[75%] shadow-sm ${bgColor} ${senderType === "user" ? "rounded-br-none" : "rounded-bl-none"} text-sm sm:text-base`;
          div.appendChild(bubble);
          chatArea.appendChild(div);
          chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTypingIndicator() {
          const id = "typing-" + Date.now();
          const ind = document.createElement("div");
          ind.id = id;
          ind.className = "flex justify-start mb-2";
          ind.innerHTML = `<div class="bg-gray-100 text-gray-500 p-3 sm:p-4 rounded-2xl rounded-bl-none flex items-center gap-2"><div class="flex gap-1"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div><span class="text-xs sm:text-sm">Detecting language...</span></div>`;
          chatArea.appendChild(ind);
          chatArea.scrollTop = chatArea.scrollHeight;
          return id;
        }
        function removeTypingIndicator(id) {
          document.getElementById(id)?.remove();
        }
        function cleanupOldMessages() {
          const msgs = chatArea.querySelectorAll("div.flex");
          if (msgs.length > MAX_MESSAGES) {
            for (let i = 0; i < msgs.length - MAX_MESSAGES; i++)
              msgs[i]?.remove();
          }
        }
      });
    </script>
  </body>
</html>
